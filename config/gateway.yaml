# MINXG Gateway config — single source of truth for the open gateway.
# Editing this file (NOT any code) is enough to change runtime behavior.
# All fields are optional; defaults are in `gateway/config.py`.

gateway:
  host: 0.0.0.0
  port: 18080

ai:
  provider: openai            # openai | anthropic | minimax | custom
  model: MiniMax-M3
  base_url: https://api.iamhc.cn/v1
  api_key: ""                 # leave empty; CLI `minxg key` will fill it

workers:
  host: 127.0.0.1
  port: 19001

# Channels (inspired by the channel/manager pattern in
# /storage/emulated/0/文件/mmm/gateway — reimplemented natively here).
# Each entry becomes a ChannelConfig on GatewayConfig.channels.
channels:
  - {name: default, enabled: true,  adapter: memory}
  - {name: cli,     enabled: true,  adapter: memory}
  - {name: rest,    enabled: true,  adapter: http, options: {path: /v1/chat/completions}}

  # Messaging-platform channels — disabled by default. Flip `enabled` to
  # true and fill in credentials (here or via the env vars named below)
  # to have the gateway talk through that platform. See
  # gateway/channel_telegram.py / channel_discord.py / channel_slack.py
  # for the exact wire protocol each one speaks, and their "Honesty
  # note" docstrings for what has/hasn't been live-tested.
  - name: telegram
    enabled: false
    adapter: telegram
    options:
      bot_token: ""            # or set TELEGRAM_BOT_TOKEN
      allowed_chat_ids: []     # empty = allow any chat that messages the bot
      poll_timeout: 25
  - name: discord
    enabled: false
    adapter: discord
    options:
      bot_token: ""            # or set DISCORD_BOT_TOKEN
      allowed_channel_ids: []  # empty = allow any channel the bot can see
  - name: slack
    enabled: false
    adapter: slack
    options:
      bot_token: ""            # xoxb-...  or set SLACK_BOT_TOKEN
      app_token: ""            # xapp-...  or set SLACK_APP_TOKEN (Socket Mode)
      allowed_channel_ids: []

legacy:
  enable: false
  routes: []

schema_cache_ttl: 60.0
