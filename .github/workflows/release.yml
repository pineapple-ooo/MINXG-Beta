name: Release

on:
  push:
    tags:
      - "v*.*.*"          # 匹配 v0.12.2 这种 tag
  workflow_dispatch:        # 也允许在网页手动点按钮触发

permissions:
  contents: write          # 用来创建 GitHub Release

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi            # PyPI 端的 trusted publisher 绑的是这个 environment
    permissions:
      id-token: write            # 启用 OIDC — Trusted Publishing 必需
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish (OIDC, no token secret needed)
        uses: pypa/gh-action-pypi-publish@release/v1
        # 不用 with: token: ... PyPI 后台已配 trusted publisher

  github-release:
    name: GitHub Release + CHANGELOG
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # 需要有 CHANGELOG.md

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract CHANGELOG section for this version
        id: changelog
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # 从 v0.12.1 提取出 0.12.1
          VERSION="${VERSION#v}"
          # 把 VERSION 作为环境变量传给 python，避免 heredoc 的转义陷阱
          export VERSION
          python - <<'PY'
          import os, re, pathlib
          ver = os.environ["VERSION"]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"^## \[{re.escape(ver)}\].*?(?=^## \[|\Z)", text, re.M | re.S)
          if m:
              notes = m.group(0).rstrip() + "\n"
          else:
              notes = f"## [{ver}](CHANGELOG.md)\n\nSee CHANGELOG.md for details.\n"
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.parent.mkdir(parents=True, exist_ok=True)
          with out.open("a", encoding="utf-8") as f:
              f.write(f"notes<<EOF\n{notes}EOF\n")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          fail_on_unmatched_files: false
          # dist/ 下的 wheel 和 sdist 会自动作为附件挂上去
